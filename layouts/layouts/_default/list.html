<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="p-6 bg-white shadow-sm mb-10">
        <h1 class="text-2xl font-bold text-center"><a href="/">{{ .Site.Title }}</a></h1>
    </nav>
    <main class="max-w-4xl mx-auto px-4">
        <div class="grid gap-8">
            {{ range .Paginator.Pages }}
            <article class="p-6 bg-white rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-2"><a href="{{ .Permalink }}" class="hover:text-blue-600">{{ .Title }}</a></h2>
                <p class="text-sm text-gray-500 mb-4">{{ .Date.Format "January 2, 2006" }}</p>
                <p class="text-gray-700">{{ .Summary }}...</p>
            </article>
            {{ end }}
        </div>
    </main>
</body>
</html>
