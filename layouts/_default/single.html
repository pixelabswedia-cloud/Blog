<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="p-6 bg-white shadow-sm">
        <h1 class="text-xl font-bold text-center"><a href="/">{{ .Site.Title }}</a></h1>
    </nav>
    <article class="max-w-3xl mx-auto px-4 py-12">
        <header class="mb-8">
            <h1 class="text-4xl font-extrabold mb-4">{{ .Title }}</h1>
            <p class="text-gray-500 italic">Published on {{ .Date.Format "January 2, 2006" }}</p>
        </header>
        
        <div class="prose prose-lg max-w-none text-gray-800 leading-relaxed">
            {{ .Content }}
        </div>
        <footer class="mt-12 pt-6 border-t border-gray-200">
            <p class="text-center text-gray-500">&copy; 2026 {{ .Site.Title }}</p>
        </footer>
    </article>
</body>
</html>
