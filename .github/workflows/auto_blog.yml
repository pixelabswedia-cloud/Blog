name: Auto Blog AI Gratis

on:
  schedule:
    # Berjalan otomatis setiap hari jam 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch: # Tombol rahasia untuk tes manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Memberikan izin kepada bot untuk menulis file ke repositori Anda
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google AI Library
        run: pip install -q -U google-generativeai

      - name: Generate Artikel
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_blog.py

      - name: Push Artikel ke GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Pastikan folder posts terdeteksi oleh git
          mkdir -p posts
          
          # Menambahkan file hanya jika ada file baru di folder posts
          git add posts/*.md || echo "Tidak ada file .md baru ditemukan."
          
          # Cek apakah ada yang perlu di-commit
          if git diff --cached --quiet; then
            echo "Status: Tidak ada perubahan artikel untuk di-commit."
          else
            git commit -m "Auto-post: Update artikel blog via Gemini AI"
            git push
          fi
