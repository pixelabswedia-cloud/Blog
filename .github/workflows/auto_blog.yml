name: Auto Blog Gratis Gemini

on:
  schedule:
    - cron: '0 0 * * *' # Jalan otomatis jam 7 pagi WIB setiap hari
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google AI Library
        run: pip install -q -U google-generativeai

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_blog.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posts/*.md
          git commit -m "Update artikel otomatis [skip ci]" || echo "Tidak ada perubahan"
          git push
